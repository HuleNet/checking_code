services:
  db:
    image: postgres:16
    container_name: checking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: checking_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${BROKER_USER}
      RABBITMQ_DEFAULT_PASS: ${BROKER_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: checking_app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      uv run uvicorn checking_service.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  worker:
    build: .
    container_name: checking_worker
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    command: >
      uv run celery -A checking_service.infrastructure.core.celery_app worker
      --loglevel=info

  flower:
    image: mher/flower
    container_name: checking_flower
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: amqp://${BROKER_USER}:${BROKER_PASSWORD}@rabbitmq:5672//

volumes:
  postgres_data: