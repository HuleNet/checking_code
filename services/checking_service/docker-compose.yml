services:

  db:
    image: postgres:17

    environment:
      POSTGRES_DB: checking
      POSTGRES_USER: checking
      POSTGRES_PASSWORD: checking

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U checking"]
      interval: 5s
      retries: 20


  rabbitmq:
    image: rabbitmq:4-management

    ports:
      - "5672:5672"
      - "15672:15672"



  migrator:
    build: .

    env_file:
      - .env

    command:
      - alembic
      - upgrade
      - head

    volumes:
      - ./alembic:/app/alembic

    depends_on:
      db:
        condition: service_healthy


  api:
    build: .

    env_file:
      - .env
    
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock

    ports:
      - "8000:8000"

    command:
      - uvicorn
      - checking_service.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - /var/run/docker.sock:/var/run/docker.sock

    depends_on:
      migrator:
        condition: service_completed_successfully



  worker:
    build: .

    env_file:
      - .env

    environment:
      DOCKER_HOST: unix:///var/run/docker.sock

    command:
      - celery
      - -A
      - checking_service.infrastructure.core.celery_app
      - worker
      - --loglevel=info

    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - /var/run/docker.sock:/var/run/docker.sock

    depends_on:
      migrator:
        condition: service_completed_successfully


volumes:
  postgres_data: